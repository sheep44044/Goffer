services:
  # ==========================================
  # 1. 服务治理与缓存
  # ==========================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.9
    container_name: goffer-etcd
    entrypoint: /usr/local/bin/etcd
    command:
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://0.0.0.0:2379
    ports:
      - "2379:2379"
      - "2380:2380"
    networks:
      - goffer_net

  redis:
    image: redis:alpine
    container_name: goffer-redis
    command: redis-server --requirepass 123456
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - goffer_net

  # ==========================================
  # 2. 核心数据库集群
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: goffer-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: goffer
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - goffer_net

  mongodb:
    image: mongo:7
    container_name: goffer-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - goffer_net

  minio:
    image: minio/minio:latest
    container_name: goffer-minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - goffer_net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: goffer-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - goffer_net

  # ==========================================
  # 3. 异步消息队列
  # ==========================================
  kafka:
    image: apache/kafka:4.0.2
    container_name: goffer-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - goffer_net

  # ==========================================
  # 4. 可观测性
  # ==========================================
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: goffer-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
    networks:
      - goffer_net

  prometheus:
    image: prom/prometheus:latest
    container_name: goffer-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - goffer_net

  grafana:
    image: grafana/grafana:latest
    container_name: goffer-grafana
    ports:
      - "3002:3000"
    networks:
      - goffer_net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: goffer-otel
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "8889:8889"
    depends_on:
      - jaeger
    networks:
      - goffer_net

volumes:
  redis_data:
  mysql_data:
  mongo_data:
  minio_data:
  qdrant_data:

networks:
  goffer_net:
    driver: bridge
