<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goffer - 候选人面试</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <audio id="remoteAudio" autoplay playsinline></audio>

  <header class="topbar">
    <div class="container topbar-inner">
      <div>
        <p class="eyebrow">Goffer Candidate</p>
        <h1>AI 拟真面试</h1>
      </div>
      <div class="topbar-actions">
        <span id="userBadge" class="badge badge-muted" hidden></span>
        <button id="logoutBtn" class="btn btn-outline btn-sm" type="button" hidden>退出登录</button>
      </div>
    </div>
  </header>

  <main class="container app-grid">
    <section id="authSection" class="panel auth-panel">
      <div class="tabs compact-tabs">
        <button class="tab active" type="button" data-auth-tab="login">登录</button>
        <button class="tab" type="button" data-auth-tab="register">注册</button>
      </div>

      <div id="authAlert" class="alert" hidden></div>

      <div id="loginPane">
        <h2>进入面试间</h2>
        <p class="muted">登录后可上传简历并开始文本或语音面试。</p>
        <form id="loginForm" class="form-stack">
          <label for="loginUsername">用户名</label>
          <input id="loginUsername" autocomplete="username" placeholder="candidate">
          <label for="loginPassword">密码</label>
          <input id="loginPassword" type="password" autocomplete="current-password" placeholder="123456">
          <button id="loginBtn" class="btn btn-primary full-width" type="submit">登录</button>
        </form>
      </div>

      <div id="registerPane" hidden>
        <h2>创建候选人账号</h2>
        <p class="muted">注册成功后可直接用该账号登录。</p>
        <form id="registerForm" class="form-stack">
          <label for="registerUsername">用户名</label>
          <input id="registerUsername" autocomplete="username" placeholder="candidate">
          <label for="registerPassword">密码</label>
          <input id="registerPassword" type="password" autocomplete="new-password" placeholder="至少 6 位">
          <button id="registerBtn" class="btn btn-primary full-width" type="submit">注册</button>
        </form>
      </div>
    </section>

    <section id="candidateShell" class="workspace" hidden>
      <section id="setupSection" class="layout-two">
        <div class="panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Step 1</p>
              <h2>上传简历</h2>
            </div>
            <span class="badge badge-muted">PDF / JPG / PNG</span>
          </div>

          <div id="resumeDrop" class="file-drop" role="button" tabindex="0">
            <div class="file-drop-icon">DOC</div>
            <p>拖拽简历到此处，或点击选择文件</p>
            <span>最大 10MB</span>
          </div>
          <input id="resumeInput" type="file" accept=".pdf,.jpg,.jpeg,.png" hidden>
          <div id="resumeUploadState" class="inline-status" hidden></div>
          <div id="resumeAlert" class="alert" hidden></div>

          <div id="resumeResult" class="result-box" hidden>
            <dl>
              <dt>文件名</dt>
              <dd id="resumeName"></dd>
              <dt>ResumeID</dt>
              <dd id="resumeID"></dd>
              <dt>FileURL</dt>
              <dd id="resumeURL"></dd>
            </dl>
          </div>
        </div>

        <div class="panel start-panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Step 2</p>
              <h2>开始面试</h2>
            </div>
            <span class="badge badge-success">SSE + WebRTC</span>
          </div>
          <div id="setupEmpty" class="empty-state compact">
            <div class="empty-icon">ID</div>
            <p>上传简历后即可启动 AI 面试会话。</p>
          </div>
          <button id="startInterviewBtn" class="btn btn-primary full-width" type="button" disabled>开始面试</button>
          <div id="startAlert" class="alert" hidden></div>
          <div class="hint-list">
            <p id="speechSupport"></p>
            <p id="ttsSupport"></p>
          </div>
        </div>
      </section>

      <section id="chatSection" class="panel interview-panel" hidden>
        <div class="interview-header">
          <div>
            <p class="eyebrow">Live Interview</p>
            <h2>面试进行中</h2>
          </div>
          <button id="endInterviewBtn" class="btn btn-outline" type="button">结束面试</button>
        </div>

        <div class="voice-toolbar">
          <span id="voiceDot" class="status-dot disconnected"></span>
          <span id="voiceStateText">语音未连接</span>
          <div class="mic-meter"><span id="micLevel"></span></div>
          <button id="muteBtn" class="btn btn-sm btn-outline" type="button" disabled>静音</button>
          <button id="interruptBtn" class="btn btn-sm btn-danger" type="button" disabled>打断</button>
          <button id="voiceModeBtn" class="btn btn-sm btn-outline" type="button">语音输入</button>
        </div>
        <div id="voiceReconnect" class="reconnect-banner" hidden>语音链路断开，正在尝试重连。</div>

        <div class="progress-rail">
          <div class="progress-step active" data-stage="greeting">
            <span>1</span>
            自我介绍
          </div>
          <div class="progress-step" data-stage="tech_foundation">
            <span>2</span>
            技术基础
          </div>
          <div class="progress-step" data-stage="tech_architecture">
            <span>3</span>
            架构设计
          </div>
          <div class="progress-step" data-stage="evaluator">
            <span>4</span>
            综合评估
          </div>
          <small id="roundText">第 1 轮</small>
        </div>

        <div id="chatBox" class="chat-box" aria-live="polite"></div>
        <div id="chatAlert" class="alert" hidden></div>

        <div class="chat-composer">
          <textarea id="chatInput" rows="2" placeholder="输入回答，Enter 发送，Shift + Enter 换行"></textarea>
          <button id="sendBtn" class="btn btn-primary" type="button">发送</button>
        </div>
      </section>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/webrtc.js"></script>
  <script src="js/candidate.js"></script>
</body>
</html>
