<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goffer - 管理端</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div>
        <p class="eyebrow">Goffer Admin</p>
        <h1>知识库管理</h1>
      </div>
      <div class="topbar-actions">
        <span id="userBadge" class="badge badge-muted" hidden></span>
        <button id="logoutBtn" class="btn btn-outline btn-sm" type="button" hidden>退出登录</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section id="loginSection" class="panel auth-panel">
      <h2>面试官登录</h2>
      <p class="muted">登录后可维护 JD 和面试题库。</p>
      <form id="loginForm" class="form-stack">
        <label for="loginUsername">用户名</label>
        <input id="loginUsername" autocomplete="username" placeholder="admin">
        <label for="loginPassword">密码</label>
        <input id="loginPassword" type="password" autocomplete="current-password" placeholder="请输入密码">
        <button id="loginBtn" class="btn btn-primary full-width" type="submit">登录</button>
      </form>
      <div id="loginAlert" class="alert" hidden></div>
    </section>

    <section id="adminShell" class="workspace" hidden>
      <nav class="tabs admin-tabs">
        <button class="tab active" type="button" data-tab="jdManual">录入 JD</button>
        <button class="tab" type="button" data-tab="jdCsv">导入 JD CSV</button>
        <button class="tab" type="button" data-tab="questionManual">录入题目</button>
        <button class="tab" type="button" data-tab="questionCsv">导入题库 CSV</button>
      </nav>

      <section class="panel" data-panel="jdManual">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Job Description</p>
            <h2>手动录入 JD</h2>
          </div>
        </div>
        <form id="jdForm" class="form-grid">
          <div>
            <label for="jdCompany">公司</label>
            <input id="jdCompany" placeholder="字节跳动">
          </div>
          <div>
            <label for="jdTitle">岗位</label>
            <input id="jdTitle" placeholder="高级 Golang 工程师">
          </div>
          <div class="span-2">
            <label for="jdResponsibilities">职责</label>
            <textarea id="jdResponsibilities" rows="5" placeholder="负责微服务架构设计与实现..."></textarea>
          </div>
          <div class="span-2">
            <label for="jdRequirements">要求</label>
            <textarea id="jdRequirements" rows="5" placeholder="5 年以上 Go 开发经验，熟悉 K8s..."></textarea>
          </div>
          <div class="span-2 tag-editor">
            <label for="jdTagInput">标签</label>
            <div class="inline-form">
              <input id="jdTagInput" placeholder="输入标签后回车">
              <button id="addJdTagBtn" class="btn btn-outline" type="button">添加</button>
            </div>
            <div id="jdTags" class="tag-list"></div>
          </div>
          <button id="jdSubmitBtn" class="btn btn-primary" type="submit">提交 JD</button>
        </form>
        <div id="jdAlert" class="alert" hidden></div>
      </section>

      <section class="panel" data-panel="jdCsv" hidden>
        <div class="section-heading">
          <div>
            <p class="eyebrow">CSV Import</p>
            <h2>批量导入 JD</h2>
          </div>
          <span class="badge badge-muted">公司,岗位,职责,要求,标签</span>
        </div>
        <div id="jdCsvDrop" class="file-drop" role="button" tabindex="0">
          <div class="file-drop-icon">CSV</div>
          <p>拖拽 JD CSV 到此处，或点击选择</p>
          <span>表头：公司,岗位,职责,要求,标签</span>
        </div>
        <input id="jdCsvInput" type="file" accept=".csv" hidden>
        <div id="jdCsvState" class="inline-status" hidden></div>
        <div id="jdCsvAlert" class="alert" hidden></div>
      </section>

      <section class="panel" data-panel="questionManual" hidden>
        <div class="section-heading">
          <div>
            <p class="eyebrow">Question Bank</p>
            <h2>手动录入题目</h2>
          </div>
        </div>
        <form id="questionForm" class="form-grid">
          <div class="span-2">
            <label for="questionContent">题目内容</label>
            <textarea id="questionContent" rows="5" placeholder="请解释 Go 中 Channel 的底层实现原理"></textarea>
          </div>
          <div class="span-2">
            <label for="questionAnswer">标准答案</label>
            <textarea id="questionAnswer" rows="6" placeholder="Channel 在运行时由 hchan 结构体表示..."></textarea>
          </div>
          <div>
            <label for="questionDifficulty">难度</label>
            <select id="questionDifficulty">
              <option value="简单">简单</option>
              <option value="中等" selected>中等</option>
              <option value="困难">困难</option>
            </select>
          </div>
          <div class="tag-editor">
            <label for="questionTagInput">标签</label>
            <div class="inline-form">
              <input id="questionTagInput" placeholder="输入标签后回车">
              <button id="addQuestionTagBtn" class="btn btn-outline" type="button">添加</button>
            </div>
          </div>
          <div id="questionTags" class="tag-list span-2"></div>
          <button id="questionSubmitBtn" class="btn btn-primary" type="submit">提交题目</button>
        </form>
        <div id="questionAlert" class="alert" hidden></div>
      </section>

      <section class="panel" data-panel="questionCsv" hidden>
        <div class="section-heading">
          <div>
            <p class="eyebrow">CSV Import</p>
            <h2>批量导入题库</h2>
          </div>
          <span class="badge badge-muted">题目,标准答案,难度,标签</span>
        </div>
        <div id="questionCsvDrop" class="file-drop" role="button" tabindex="0">
          <div class="file-drop-icon">CSV</div>
          <p>拖拽题库 CSV 到此处，或点击选择</p>
          <span>表头：题目,标准答案,难度,标签</span>
        </div>
        <input id="questionCsvInput" type="file" accept=".csv" hidden>
        <div id="questionCsvState" class="inline-status" hidden></div>
        <div id="questionCsvAlert" class="alert" hidden></div>
      </section>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
